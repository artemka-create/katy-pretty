<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Katy Pretty — Предсказание</title>
<style>
  :root{
    --ink:#150c1a;
    --plum:#5c2a6b;
    --orchid:#a24fa0;
    --petal:#f0bfe0;
    --blush:#f8ecf6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    font-family:'Helvetica Neue', Arial, sans-serif;
    overflow:hidden;
    color:var(--ink);
  }
  body{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    min-height:100dvh;
  }

  /* ---------- animated gradient background : soft merging circles, slow-mo but alive ---------- */
  #bg{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background:#f8ecf6;
  }
  #bg .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    will-change:transform;
    transition:animation-duration 1.2s ease, filter 1.2s ease, opacity 1.2s ease;
  }
  #bg .b1{
    width:70vmax; height:70vmax; left:-20vmax; top:-15vmax;
    background:radial-gradient(circle, #f6d9ee 0%, rgba(246,217,238,0) 70%);
    animation:float1 26s ease-in-out infinite;
  }
  #bg .b2{
    width:75vmax; height:75vmax; right:-25vmax; top:-20vmax;
    background:radial-gradient(circle, #9b4fa0 0%, rgba(155,79,160,0) 70%);
    animation:float2 32s ease-in-out infinite;
    opacity:.85;
  }
  #bg .b3{
    width:65vmax; height:65vmax; left:-15vmax; bottom:-20vmax;
    background:radial-gradient(circle, #5a2168 0%, rgba(90,33,104,0) 70%);
    animation:float3 30s ease-in-out infinite;
    opacity:.8;
  }
  #bg .b4{
    width:60vmax; height:60vmax; right:-18vmax; bottom:-15vmax;
    background:radial-gradient(circle, #f0b8de 0%, rgba(240,184,222,0) 70%);
    animation:float4 24s ease-in-out infinite;
  }
  #bg .b5{
    width:50vmax; height:50vmax; left:25vmax; top:20vmax;
    background:radial-gradient(circle, #c874c6 0%, rgba(200,116,198,0) 70%);
    animation:float5 28s ease-in-out infinite;
    opacity:.6;
  }
  body.active #bg .blob{
    filter:blur(85px);
  }
  body.active #bg .b1{ animation-duration:16s; }
  body.active #bg .b2{ animation-duration:19s; opacity:.95; }
  body.active #bg .b3{ animation-duration:18s; opacity:.9; }
  body.active #bg .b4{ animation-duration:15s; }
  body.active #bg .b5{ animation-duration:17s; opacity:.75; }

  @keyframes float1{
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(12vmax,10vmax) scale(1.12);}
    66%{transform:translate(4vmax,18vmax) scale(0.95);}
  }
  @keyframes float2{
    0%,100%{transform:translate(0,0) scale(1);}
    30%{transform:translate(-14vmax,12vmax) scale(0.9);}
    65%{transform:translate(-6vmax,-8vmax) scale(1.15);}
  }
  @keyframes float3{
    0%,100%{transform:translate(0,0) scale(1);}
    40%{transform:translate(10vmax,-12vmax) scale(1.1);}
    70%{transform:translate(16vmax,-2vmax) scale(0.92);}
  }
  @keyframes float4{
    0%,100%{transform:translate(0,0) scale(1);}
    35%{transform:translate(-10vmax,-14vmax) scale(1.08);}
    68%{transform:translate(-16vmax,-4vmax) scale(0.96);}
  }
  @keyframes float5{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-8vmax,10vmax) scale(1.2);}
  }

  .stage{
    position:relative; z-index:2;
    width:100%; max-width:520px;
    padding:32px;
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
  }

  /* ---------- intro screen ---------- */
  #intro{
    display:flex; flex-direction:column; align-items:center;
    gap:44px;
    transition:opacity .7s ease, transform .7s ease;
  }
  #intro.hide{
    opacity:0; transform:scale(.94);
    pointer-events:none;
    visibility:hidden;
  }
  .logo{
    display:flex; flex-direction:column; align-items:center;
    gap:2px;
  }
  .monogram{
    width:clamp(88px, 24vw, 128px);
    height:auto;
    margin-bottom:10px;
  }
  .wordmark-img{
    width:clamp(220px, 62vw, 360px);
    height:auto;
  }
  .logo .sub{
    font-weight:700;
    font-size:clamp(14px, 4.2vw, 20px);
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:var(--plum);
    margin-top:8px;
  }
  .logo .tagline{
    font-size:clamp(12px, 3.4vw, 14px);
    letter-spacing:0.08em;
    color:#3d2144;
    opacity:.75;
    margin-top:10px;
  }

  #predictBtn{
    appearance:none; border:none; cursor:pointer;
    background:var(--ink);
    color:#fff;
    font-size:16px;
    font-weight:600;
    letter-spacing:0.03em;
    padding:18px 38px;
    border-radius:40px;
    box-shadow:0 10px 30px rgba(30,10,40,0.25);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  #predictBtn:active{
    transform:scale(0.96);
    box-shadow:0 6px 16px rgba(30,10,40,0.25);
  }

  /* ---------- result screen ---------- */
  #result{
    position:absolute; inset:0; z-index:3;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:26px;
    padding:40px 30px;
    opacity:0;
    pointer-events:none;
    transition:opacity .6s ease;
  }
  #result.show{
    opacity:1;
    pointer-events:auto;
  }
  .label{
    font-size:12px;
    letter-spacing:0.35em;
    text-transform:uppercase;
    color:#4a2154;
    opacity:0;
    transform:translateY(8px);
    transition:opacity .6s ease .15s, transform .6s ease .15s;
  }
  #result.show .label{ opacity:.8; transform:translateY(0); }

  .prediction{
    font-family:Georgia, 'Times New Roman', serif;
    font-style:italic;
    font-size:clamp(22px, 6vw, 30px);
    line-height:1.45;
    color:var(--ink);
    max-width:440px;
    opacity:0;
    transform:translateY(14px) scale(.98);
    transition:opacity .8s ease .35s, transform .8s ease .35s;
  }
  #result.show .prediction{ opacity:1; transform:translateY(0) scale(1); }

  .heart{
    width:34px; height:30px;
    opacity:0;
    transition:opacity .8s ease .6s;
  }
  #result.show .heart{ opacity:.8; }

  #againBtn{
    appearance:none; border:1.5px solid var(--ink);
    background:transparent;
    color:var(--ink);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.05em;
    padding:12px 26px;
    border-radius:40px;
    cursor:pointer;
    opacity:0;
    transition:opacity .8s ease .8s, background .2s ease, color .2s ease;
  }
  #result.show #againBtn{ opacity:.85; }
  #againBtn:active{ background:var(--ink); color:#fff; }

  .signature{
    font-family:'Brush Script MT', cursive;
    font-size:15px;
    color:#3d2144;
    opacity:0;
    transition:opacity .8s ease .9s;
  }
  #result.show .signature{ opacity:.65; }
</style>
</head>
<body>

  <div id="bg">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>
    <div class="blob b5"></div>
  </div>

  <div class="stage">
    <div id="intro">
      <div class="logo">
        <img class="monogram" src="./logo_monogram.png" alt="KP" />
        <img class="wordmark-img" src="./logo_wordmark.png" alt="Katy Pretty" />
        <div class="sub">Стиль — это выбор</div>
        <div class="tagline">нажми на кнопку — и узнай, что тебя ждёт</div>
      </div>
      <button id="predictBtn">Предсказать будущее</button>
    </div>
  </div>

  <div id="result">
    <div class="label">Твоё предсказание</div>
    <div class="prediction" id="predictionText"></div>
    <svg class="heart" viewBox="0 0 34 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17 27C17 27 2 18 2 9.5C2 4.8 5.6 2 9.3 2C12.3 2 15 4 17 7C19 4 21.7 2 24.7 2C28.4 2 32 4.8 32 9.5C32 18 17 27 17 27Z" stroke="#3d2144" stroke-width="1.6"/>
    </svg>
    <button id="againBtn">Ещё раз</button>
    <div class="signature">с любовью, команда Katy Pretty</div>
  </div>

<script>
  const predictions = [
    "Сегодня твой выбор наряда станет твоим лучшим решением дня.",
    "Скоро в твоём гардеробе появится вещь, в которой ты почувствуешь себя увереннее.",
    "Уверенность — твой лучший аксессуар на этой неделе.",
    "Тебя ждёт комплимент за платье, которое ты чуть не оставила на вешалке.",
    "Пора позволить себе то яркое платье, которое давно приглянулось.",
    "Новый образ откроет в тебе смелость, о которой ты забыла.",
    "Твоя интуиция в выборе наряда не подведёт — доверяй ей.",
    "Скоро случится момент, когда ты наденешь что-то и почувствуешь: «это по-настоящему я».",
    "Стоит примерить цвет, который раньше казался «не твоим».",
    "Правильно подобранный образ сегодня принесёт тебе удачу.",
    "Кто-то спросит, где ты купила это платье — и это будет комплимент.",
    "Пришло время убрать из шкафа то, что давно не радует, и освободить место для нового.",
    "Твой безупречный образ сегодня притягивает восхищённые взгляды.",
    "Хорошо сидящее платье способно изменить не только фигуру, но и настроение.",
    "Простой силуэт станет твоим главным украшением на этой неделе.",
    "Тебя ждёт встреча, где твой наряд скажет больше слов.",
    "Пора вернуть в гардероб любимое платье — оно снова в моде.",
    "Маленькая деталь — пояс, серьги, шаль — изменит весь образ.",
    "Твой гардероб — это твоя история, и в ней открывается новая глава.",
    "Сегодня удачный день, чтобы примерить что-то смелее обычного.",
    "Ты вдохновишь кого-то своим образом, даже не заметив этого.",
    "Впереди повод, для которого стоит выбрать особенное платье.",
    "Доверие к себе — вот что сделает твой образ безупречным сегодня.",
    "Тебе идёт быть собой больше, чем любой тренд.",
    "Скоро любимое платье из прошлого сезона заиграет по-новому.",
    "Внутренний голос подскажет верный наряд для важного дня.",
    "Ты заслуживаешь новое платье — даже без особого повода.",
    "Женственность — это не образ, а состояние, и сегодня оно с тобой."
  ];

  const introEl = document.getElementById('intro');
  const resultEl = document.getElementById('result');
  const predictBtn = document.getElementById('predictBtn');
  const againBtn = document.getElementById('againBtn');
  const predictionText = document.getElementById('predictionText');
  const body = document.body;

  let lastIndex = -1;
  function pickPrediction(){
    let i;
    do { i = Math.floor(Math.random() * predictions.length); }
    while (i === lastIndex && predictions.length > 1);
    lastIndex = i;
    return predictions[i];
  }

  function reveal(){
    predictionText.textContent = pickPrediction();
    body.classList.add('active');
    introEl.classList.add('hide');
    setTimeout(() => resultEl.classList.add('show'), 550);
  }

  function reset(){
    resultEl.classList.remove('show');
    setTimeout(() => {
      body.classList.remove('active');
      introEl.classList.remove('hide');
    }, 400);
  }

  predictBtn.addEventListener('click', reveal);
  againBtn.addEventListener('click', reset);
</script>

</body>
</html>
